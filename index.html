<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=3" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png?v=3" />
    <link rel="shortcut icon" href="/favicon-32.png?v=3" type="image/png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=3" />
    <!-- Default fallback title; React Helmet sets the per-route title at runtime.
         Keep this minimal so it doesn't conflict with PageHelmet's canonical/title. -->
    <title>OSTAZE | منصة أستازي - دروس خصوصية ولايف أونلاين مع أفضل المعلمين</title>
    <meta name="author" content="OSTAZE - أستازي">
    <meta name="application-name" content="OSTAZE | أستازي">
    <meta name="apple-mobile-web-app-title" content="OSTAZE | أستازي">

    <!-- Security headers: authoritative copies live in `public/_headers` and are
         served as real HTTP response headers (CSP, frame-ancestors,
         X-Frame-Options, HSTS, COOP, CORP, Permissions-Policy, Referrer-Policy).
         The CSP <meta> below is a defense-in-depth fallback for environments
         where edge headers are unavailable. Note: X-Frame-Options, HSTS,
         frame-ancestors, COOP, CORP, and Permissions-Policy are intentionally
         NOT here — browsers ignore them as <meta>. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob: https://*.supabase.co https://storage.googleapis.com https://*.googleusercontent.com https://lh3.googleusercontent.com https://fonts.gstatic.com https://images.unsplash.com https://plus.unsplash.com https://*.b-cdn.net https://*.mediadelivery.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://assets.mediadelivery.net; font-src 'self' data: https://fonts.gstatic.com https://assets.mediadelivery.net; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://assets.mediadelivery.net; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://*.lovable.app https://*.lovable.dev https://*.mediadelivery.net https://*.b-cdn.net; media-src 'self' blob: https://*.supabase.co https://*.mediadelivery.net https://*.b-cdn.net; frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://docs.google.com https://www.youtube.com https://www.youtube-nocookie.com https://iframe.mediadelivery.net; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Static OG defaults; per-route title/description/canonical/og:url/og:image
         are set by react-helmet-async via <PageHelmet /> on each page. -->
    <meta property="og:site_name" content="OSTAZE" />
    <meta property="og:locale" content="ar_SA" />
    <meta property="og:locale:alternate" content="en_US" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
